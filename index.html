<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>افق کوروش - شهر صنعتی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700&display=swap');

        /* انیمیشن پس‌زمینه متحرک */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #0f2027);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 35px 25px;
            width: 350px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* بخش نمایش آیدی کانال */
        .channel-id-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 50px;
            color: #00d4ff;
            font-size: 0.85rem;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        h2 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: 700;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            text-decoration: none;
            color: white;
            padding: 15px 25px;
            border-radius: 18px;
            font-size: 1.05rem;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            width: 100%;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* استایل اختصاصی هر دکمه با گرادینت */
        .btn-bale { background: linear-gradient(90deg, #2ecc71, #27ae60); }
        .btn-rubika { background: linear-gradient(90deg, #2c3e50, #000000); }
        .btn-eitaa { background: linear-gradient(90deg, #f39c12, #d35400); }

        .btn span {
            font-size: 1.4rem;
            margin-left: 15px;
        }

        .admin-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-title {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .btn-admin {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            justify-content: center;
        }

        .btn-admin:hover {
            background: white;
            color: black;
        }

    </style>
</head>
<body>

    <div class="glass-card">
        <!-- نمایش آیدی کانال برای کاربر -->
        <div class="channel-id-badge">ID: @ok_sanati</div>
        
        <h2>کانال‌های ارتباطی<br>افق کوروش شهر صنعتی</h2>

        <div class="btn-container">
            <!-- دکمه‌ها -->
            <button onclick="smartOpen('ble://ok_sanati', 'https://ble.ir/ok_sanati')" class="btn btn-bale">
                <span>🟢</span> بله
            </button>

            <button onclick="smartOpen('rubika://rubika.ir/ok_sanati', 'https://rubika.ir/ok_sanati')" class="btn btn-rubika">
                <span>⚫</span> روبیکا
            </button>

            <button onclick="smartOpen('eitaa://eitaa.com/ok_sanati', 'https://eitaa.com/ok_sanati')" class="btn btn-eitaa">
                <span>🟠</span> ایتا
            </button>
        </div>

        <div class="admin-section">
            <div class="admin-title">مدیریت مجموعه</div>
            <button onclick="smartOpen('ble://javad_badrkhani', 'https://ble.ir/javad_badrkhani')" class="btn btn-admin">
                <span>👤</span> مدیر مجموعه
            </button>
        </div>
    </div>

    <script>
        /**
         * تابع هوشمند باز کردن اپلیکیشن
         * این تابع تلاش می‌کند ابتدا پروتکل اپلیکیشن را اجرا کند،
         * اگر اپلیکیشن نصب نباشد و بعد از ۲ ثانیه کاربر در صفحه باقی ماند، لینک وب را باز می‌کند.
         */
        function smartOpen(appScheme, webUrl) {
            const start = Date.now();
            
            // تلاش اول: باز کردن با پروتکل اپلیکیشن
            window.location.assign(appScheme);

            // تلاش دوم: اگر اپلیکیشن باز نشد، بعد از ۲ ثانیه لینک وب را باز کن
            setTimeout(() => {
                // اگر زمان سپری شده بیشتر از ۲.۵ ثانیه است، یعنی اپلیکیشن باز نشده (کاربر از صفحه خارج نشده)
                if (Date.now() - start < 2500) {
                    window.location.href = webUrl;
                }
            }, 1000);
        }
    </script>

</body>
</html>
