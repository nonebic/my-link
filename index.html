<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>افق کوروش - شهر صنعتی</title>
    <style>
        /* انیمیشن پس‌زمینه */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Tahoma', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 40px 30px;
            width: 340px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        h2 {
            color: white;
            font-size: 1.4rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            line-height: 1.8;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 14px;
            margin: 12px 0;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .btn-bale { background-color: #2ecc71; }
        .btn-rubika { background-color: #2c3e50; }
        .btn-eitaa { background-color: #f39c12; }

        .admin-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .admin-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .btn-admin {
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 1rem;
        }

        .btn span {
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>کانال‌های ارتباطی<br>افق کوروش شهر صنعتی</h2>

        <!-- دکمه‌ها حالا با تابع جاوااسکریپت کار می‌کنند -->
        <button onclick="openApp('ble://ok_sanati', 'https://ble.ir/ok_sanati')" class="btn btn-bale">
            <span>🟢</span> بله
        </button>

        <button onclick="openApp('rubika://rubika.ir/ok_sanati', 'https://rubika.ir/ok_sanati')" class="btn btn-rubika">
            <span>⚫</span> روبیکا
        </button>

        <button onclick="openApp('eitaa://eitaa.com/ok_sanati', 'https://eitaa.com/ok_sanati')" class="btn btn-eitaa">
            <span>🟠</span> ایتا
        </button>

        <div class="admin-section">
            <div class="admin-title">ارتباط با مدیریت</div>
            <button onclick="openApp('ble://javad_badrkhani', 'https://ble.ir/javad_badrkhani')" class="btn btn-admin">
                <span>👤</span> مدیر مجموعه
            </button>
        </div>
    </div>

    <script>
        /**
         * تابع هوشمند برای باز کردن اپلیکیشن
         * @param {string} appScheme - پروتکل مخصوص اپلیکیشن (مثلاً ble://)
         * @param {string} webUrl - لینک وب جایگزین (اگر اپلیکیشن نبود)
         */
        function openApp(appScheme, webUrl) {
            // ۱. ذخیره زمان شروع برای تشخیص اینکه آیا صفحه عوض شده یا نه
            var start = Date.now();

            // ۲. تلاش برای باز کردن اپلیکیشن از طریق پروتکل اختصاصی
            window.location.href = appScheme;

            // ۳. ایجاد یک تایمر: اگر بعد از ۲ ثانیه کاربر هنوز در همین صفحه بود، 
            // یعنی اپلیکیشن باز نشده (یا نصب نیست)، پس لینک وب را باز کن.
            setTimeout(function() {
                if (Date.now() - start < 2500) {
                    window.location.href = webUrl;
                }
            }, 2000);
        }
    </script>

</body>
</html>
