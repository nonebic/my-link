<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>افق کوروش صنعتی ساوه | @ok_sanati</title>
    <meta name="description" content="افق کوروش صنعتی ساوه - مرجع تخصصی محصولات صنعتی در منطقه ساوه. برای دسترسی به آخرین محصولات و اخبار، کانال‌های ما را در ایتا و روبیکا دنبال کنید.">
    <meta name="keywords" content="افق کوروش، افق کوروش ساوه، صنعتی ساوه, محصولات صنعتی, ok_sanati, کانال صنعتی">
    <meta name="author" content="Oghab Korosh Sanati">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap');

        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Vazirmatn', sans-serif;
            background: #0f2027; /* Fallback */
            background: linear-gradient(to bottom, #2c5364, #203a43, #0f2027);
            overflow: hidden;
            color: white;
        }

        /* انیمیشن پس‌زمینه */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            filter: blur(80px);
            opacity: 0.4;
            animation: float 15s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 100px); }
        }

        /* کارت اصلی شیشه‌ای */
        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px 30px;
            border-radius: 40px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            font-size: 1.7rem; 
            margin: 0 0 10px 0; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .description {
            font-size: 0.9rem;
            font-weight: 300;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .channel-id-badge {
            background: rgba(0, 210, 255, 0.2);
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            color: var(--primary-color);
            font-weight: bold;
            margin-bottom: 35px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            font-size: 1.1rem;
        }

        /* استایل دکمه‌ها */
        .btn-group { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
        }

        .btn-eitaa {
            background: linear-gradient(135deg, #ff8c00, #e67e22);
            box-shadow: 0 10px 20px rgba(230, 126, 34, 0.3);
        }

        .btn-admin {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
        }

        .btn:active { transform: scale(0.96); }

        .footer-text {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.5;
            font-weight: 300;
        }

        /* آیکون کوچک برای دکمه‌ها */
        .icon { font-size: 1.2rem; }

    </style>
</head>
<body>

<!-- پس‌زمینه متحرک -->
<div class="bg-animation">
    <div class="circle" style="width: 300px; height: 300px; top: -10%; left: -10%;"></div>
    <div class="circle" style="width: 400px; height: 400px; bottom: -10%; right: -10%; animation-delay: -5s;"></div>
</div>

<div class="container">
    <!-- کلمات کلیدی در هدر برای سئو -->
    <h1>افق کوروش صنعتی</h1>
    <p class="description">تامین تجهیزات صنعتی در شهر ساوه</p>
    
    <div class="channel-id-badge">@ok_sanati</div>

    <div class="btn-group">
        <!-- دکمه ایتا -->
        <button onclick="openApp('eitaa', 'ok_sanati')" class="btn btn-eitaa">
            <span class="icon">🚀</span> ورود به کانال ایتا
        </button>

        <!-- دکمه مدیریت -->
        <button onclick="openApp('eitaa', 'None_lock')" class="btn btn-admin">
            <span class="icon">👨‍💼</span> ارتباط با مدیریت
        </button>
    </div>

    <div class="footer-text">
        آیدی این کانال در پیام‌رسان‌های ایرانی موجود است.
    </div>
</div>

<script>
    function openApp(platform, id) {
        // تلاش برای باز کردن اپلیکیشن (Deep Link)
        if (platform === 'eitaa') {
            // سعی برای باز کردن چت یا کانال
            window.location.href = `eitaa://view?member_id=${id}`;
            
            // اگر بعد از 800 میلی ثانیه باز نشد، به نسخه وب برود
            setTimeout(() => {
                window.location.href = `https://eitaa.com/${id}`;
            }, 800);
        }
    }
</script>

</body>
</html>
