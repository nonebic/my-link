<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کانال‌های ما</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            text-decoration: none;
            color: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:active {
            transform: scale(0.98);
        }

        /* رنگ‌های جدید طبق درخواست شما */
        .rubika { background-color: #333333; } /* تیره */
        .eitaa { background-color: #ff9800; }  /* نارنجی */
        .soroush { background-color: #2196f3; } /* آبی */
        .bale { background-color: #4caf50; }   /* سبز */

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>😉😃به کانال‌های ما بپیوندید</h1>
    
    <a href="https://rubika.ir/ok_basij_fer" class="btn rubika" target="_blank">روبیکا</a>
    <a href="https://eitaa.com/ok_basij_fer" class="btn eitaa" target="_blank">ایتا</a>
    <a href="https://splus.ir/ok_basij_fer" class="btn soroush" target="_blank">سروش</a>
    <a href="https://ble.ir/ok_basij_fer" class="btn bale" target="_blank">بله</a>
    <h1>ایدی کانال در پیامرسان ها : @ok_basij_fer</h1>
    <h1>منتطر حضور گزم شما هستیم </h1>
    
</div>

</body>
</html>
