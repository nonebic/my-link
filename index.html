<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>افق کوروش - شهر صنعتی</title>
    <style>
        /* انیمیشن پس‌زمینه */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Tahoma', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* پس‌زمینه رنگی متحرک */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        /* استایل Glassmorphism برای باکس اصلی */
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 40px 30px;
            width: 340px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        h2 {
            color: white;
            font-size: 1.4rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            line-height: 1.8;
        }

        /* استایل کلی دکمه‌ها */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 14px;
            margin: 12px 0;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        /* رنگ‌های درخواستی با کمی تغییر برای زیبایی بیشتر */
        .btn-bale { background-color: #2ecc71; }
        .btn-rubika { background-color: #2c3e50; }
        .btn-eitaa { background-color: #f39c12; }

        /* استایل دکمه مدیریت */
        .admin-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .admin-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .btn-admin {
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 1rem;
        }

        .btn-admin:hover {
            background-color: #ffffff;
            color: #000;
        }

        /* اضافه کردن ایموجی به دکمه‌ها */
        .btn span {
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>کانال‌های ارتباطی<br>افق کوروش شهر صنعتی</h2>

        <!-- دکمه‌ها -->
        <a href="https://ble.ir/ok_sanati" class="btn btn-bale"><span>🟢</span> بله</a>
        <a href="https://rubika.ir/ok_sanati" class="btn btn-rubika"><span>⚫</span> روبیکا</a>
        <a href="https://eitaa.com/ok_sanati" class="btn btn-eitaa"><span>🟠</span> ایتا</a>

        <!-- بخش مدیریت -->
        <div class="admin-section">
            <div class="admin-title">ارتباط با مدیریت</div>
            <a href="https://ble.ir/javad_badrkhani" class="btn btn-admin">👤 مدیر مجموعه</a>
        </div>
    </div>

</body>
</html>
