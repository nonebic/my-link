<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>افق کوروش | شعبه شهرک صنعتی کاوه</title>
    <meta name="description" content="فروشگاه افق کوروش شعبه شهرک صنعتی کاوه ساوه. آدرس: ورودی دوم شهرک صنعتی کاوه، بعد از گمرک، میدان امام خمینی. دسترسی سریع به کانال و مدیریت.">
    <meta name="keywords" content="افق کوروش ساوه, افق کوروش شهرک صنعتی کاوه, فروشگاه افق کوروش, ساوه, گمرک ساوه">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-Variable-font-face.css" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); }
        body {
            margin: 0;
            font-family: 'Vazirmatn', sans-serif;
            background: radial-gradient(circle at top right, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h1 { font-size: 1.4rem; margin-bottom: 5px; color: #ffd700; }
        .address { font-size: 0.9rem; opacity: 0.8; margin-bottom: 25px; line-height: 1.6; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: bold;
            text-decoration: none;
            transition: 0.4s;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-3px); }
        .footer { font-size: 0.75rem; margin-top: 25px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="container">
        <h1>افق کوروش</h1>
        <p style="font-size: 0.8rem; margin-bottom: 15px;">شعبه شهرک صنعتی کاوه</p>
        <div class="address">
            آدرس: ساوه، شهرک صنعتی کاوه، ورودی دوم، بعد از گمرک، میدان امام خمینی
        </div>

        <button class="btn" onclick="openApp('ok_sanati')">ورود به کانال ایتا (@ok_sanati)</button>
        <button class="btn" onclick="openApp('None_lock')">ارتباط با مدیریت (@None_lock)</button>
        
        <div class="footer">این کانال در تمامی پیام‌رسان‌های ایرانی در دسترس است.</div>
    </div>

    <script>
        function openApp(id) {
            // استفاده از پروتکل اینتنت برای خروج از مرورگر داخلی و باز کردن مستقیم در اپلیکیشن
            const intentUrl = `intent://eitaa.com/${id}#Intent;scheme=https;package=com.eitaa.android;end`;
            
            // تلاش اول: باز کردن از طریق پروتکل ایتا
            window.location.href = `eitaa://view?member_id=${id}`;

            // تلاش دوم: اگر باز نشد، هدایت به اپلیکیشن از طریق اینتنت یا وب
            setTimeout(() => {
                if (/Android/i.test(navigator.userAgent)) {
                    window.location.href = intentUrl;
                } else {
                    window.location.href = `https://eitaa.com/${id}`;
                }
            }, 600);
        }
    </script>
</body>
</html>
